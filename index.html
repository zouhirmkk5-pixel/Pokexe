<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Champions - Global Resource Sync</title>
    <style>
        /* CSS Settings */
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #050510;
            background-image: radial-gradient(circle at 50% 50%, #1a1b3a 0%, #050510 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 450px;
            z-index: 2;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 242, 255, 0.05);
        }

        .logo {
            width: 180px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
        }

        input, select {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .neon-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            transition: 0.3s;
        }

        .neon-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 25px var(--primary);
        }

        .resource-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .res-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .res-item.selected {
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.1);
        }

        .hidden { display: none; }

        .live-activity {
            margin-top: 20px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 50px;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 8px #2ecc71;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="Pokemon" class="logo">
        
        <div id="step1">
            <h2>Connect Trainer</h2>
            <input type="text" id="username" placeholder="Trainer Name...">
            <select id="platform">
                <option value="ios">iOS / iPhone</option>
                <option value="android">Android</option>
                <option value="switch">Nintendo Switch</option>
            </select>
            <button class="neon-btn" onclick="goToStep(2)">Connect Now</button>
        </div>

        <div id="step2" class="hidden">
            <h2>Select Rewards</h2>
            <div class="resource-grid">
                <div class="res-item" onclick="this.classList.toggle('selected')">
                    <strong>50,000</strong><br><small>Victory Points</small>
                </div>
                <div class="res-item" onclick="this.classList.toggle('selected')">
                    <strong>10,000</strong><br><small>Champion Gems</small>
                </div>
            </div>
            <button class="neon-btn" onclick="goToStep(3)">Sync to Server</button>
        </div>

        <div id="step3" class="hidden">
            <h2>Human Verification</h2>
            <p style="font-size: 0.9rem; margin-bottom: 20px;">To avoid bot abuse, please complete one task below to release your rewards.</p>
            
            <div style="background: rgba(0,242,255,0.1); padding: 20px; border-radius: 15px; border: 1px dashed var(--primary);">
                <p>Waiting for completion...</p>
                </div>
        </div>

        <div class="live-activity">
            <span class="status-dot"></span> <span id="dynamic-text">User `AshKetchum` is syncing 10k gems...</span>
        </div>
    </div>
</div>

<script>
    function goToStep(step) {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.add('hidden');
        document.getElementById('step' + step).classList.remove('hidden');
    }

    // Dynamic Activity Feed
    const users = ['Trainer_X', 'PokeMaster99', 'Daniel_Pro', 'Sarah_USA', 'LuckyGuy'];
    setInterval(() => {
        const user = users[Math.floor(Math.random() * users.length)];
        document.getElementById('dynamic-text').innerText = `User \`${user}\` just claimed rewards!`;
    }, 4000);
</script>

</body>
</html>
