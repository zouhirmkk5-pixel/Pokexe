<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Champions 2026 - Global Resource Sync</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;800&display=swap');

        :root {
            --primary: #00f2ff;
            --accent: #ff007a;
            --gold: #ffcc00;
            --glass-bg: rgba(7, 10, 20, 0.98);
            --neon-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }

        body {
            background: #02050a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #0a1525 0%, #02050a 100%);
        }

        /* Glassmorphism Background Pattern */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(var(--primary) 1px, transparent 1px),
                radial-gradient(var(--accent) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            opacity: 0.05;
            z-index: -1;
        }

        nav {
            background: rgba(0,0,0,0.9);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        .main-card {
            background: var(--glass-bg);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 40px;
            width: 100%;
            max-width: 480px;
            padding: 50px 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), var(--neon-shadow);
            text-align: center;
            position: relative;
        }

        .badge-pro {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            font-size: 0.7rem;
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: 900;
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 5px 15px rgba(255, 0, 122, 0.5);
        }

        h2 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; margin-top: 20px; text-shadow: 0 0 10px var(--primary); }

        .input-ui {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(0, 242, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .input-ui:focus { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); outline: none; }

        .grid-rewards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .reward-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 25px 10px;
            cursor: pointer;
            transition: 0.4s;
        }

        .reward-card:hover, .reward-card.active {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Base64 Icons (Embedded) */
        .icon-box {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .btn-action {
            background: linear-gradient(to right, #00f2ff, #0072ff);
            color: #000;
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.4rem;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.4);
            transition: 0.3s;
        }

        .btn-action:hover { transform: scale(1.02); box-shadow: 0 15px 40px rgba(0, 242, 255, 0.6); }

        .loader-box { padding: 40px 0; }
        .spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(0,242,255,0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .activity-feed {
            margin-top: 40px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 15px 25px;
            border-radius: 100px;
            color: var(--primary);
            border: 1px solid rgba(0,242,255,0.2);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <div style="font-family: 'Orbitron'; font-weight: 900; font-size: 1.5rem; color: #fff;">
        POKÉ<span style="color: var(--primary);">SYNC</span>
    </div>
    <div style="font-size: 0.7rem; color: #2ecc71; font-weight: 800;">● SYSTEM_ENCRYPTED</div>
</nav>

<div class="container">
    <div class="main-card">
        <div class="badge-pro">SECURE V4.0</div>

        <div id="ui-step1">
            <h2>TRAINER SYNC</h2>
            <p style="color: #666; margin-bottom: 30px;">Direct Database Access 2026</p>
            <input type="text" class="input-ui" id="trainer-name" placeholder="Trainer Username...">
            <select class="input-ui">
                <option>Select Platform</option>
                <option>iOS / Android</option>
                <option>Nintendo Switch</option>
            </select>
            <button class="btn-action" onclick="toStep2()">INITIALIZE</button>
        </div>

        <div id="ui-step2" class="hidden">
            <h3>SELECT PACKAGE</h3>
            <div class="grid-rewards">
                <div class="reward-card active" onclick="selectReward(this, '50,000 VP')">
                    <span class="icon-box">🏆</span>
                    <span style="display:block; font-weight:900; font-size:1.2rem;">50,000</span>
                    <small style="color:var(--primary)">VP POINTS</small>
                </div>
                <div class="reward-card" onclick="selectReward(this, '10,000 Gems')">
                    <span class="icon-box">💎</span>
                    <span style="display:block; font-weight:900; font-size:1.2rem;">10,000</span>
                    <small style="color:var(--primary)">GEMS</small>
                </div>
                <div class="reward-card" onclick="selectReward(this, 'Elite Pass')">
                    <span class="icon-box">🎫</span>
                    <span style="display:block; font-weight:900; font-size:1.2rem;">S-12</span>
                    <small style="color:var(--primary)">ELITE PASS</small>
                </div>
                <div class="reward-card" onclick="selectReward(this, 'Omni Stone')">
                    <span class="icon-box">⭐</span>
                    <span style="display:block; font-weight:900; font-size:1.2rem;">OMNI</span>
                    <small style="color:var(--primary)">STONE</small>
                </div>
            </div>
            <button class="btn-action" onclick="toStep3()">SYNC NOW</button>
        </div>

        <div id="ui-sync" class="hidden loader-box">
            <div class="spinner"></div>
            <h4 id="status-text" style="color: var(--primary); font-family: 'Orbitron';">ENCRYPTING...</h4>
            <div style="width: 100%; background: #111; height: 10px; border-radius: 20px; overflow: hidden; margin-top: 25px;">
                <div id="progress-bar" style="width: 0%; height: 100%; background: var(--primary); transition: 0.3s; box-shadow: 0 0 15px var(--primary);"></div>
            </div>
        </div>

        <div id="ui-locker" class="hidden">
            <h3 style="color: var(--accent);">ANTI-BOT CHECK</h3>
            <p style="font-size: 0.9rem; color: #ccc;">Syncing <span id="summary-res" style="color: var(--primary); font-weight:bold;">...</span> to your account. Finalize to complete.</p>
            <div style="background: rgba(255,255,255,0.03); padding: 30px; border: 2px dashed var(--primary); border-radius: 30px; margin: 30px 0;">
                <i class="fas fa-shield-alt" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
                <button class="btn-action" style="background: var(--accent); color: #fff;" onclick="window.location.href='YOUR_LOCKER_LINK'">VERIFY MANUALLY</button>
            </div>
            <p style="font-size: 0.7rem; color: #555;">ID: SYNC-2026-XQ-99</p>
        </div>

        <div class="activity-feed">
            <i class="fas fa-bolt"></i> <span id="live-text">Waiting for trainer...</span>
        </div>
    </div>
</div>

<script>
    let selectedItem = "50,000 VP";

    function toStep2() {
        if(document.getElementById('trainer-name').value.length < 3) return alert('Enter Trainer ID');
        document.getElementById('ui-step1').classList.add('hidden');
        document.getElementById('ui-step2').classList.remove('hidden');
    }

    function selectReward(el, name) {
        document.querySelectorAll('.reward-card').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        selectedItem = name;
    }

    function toStep3() {
        document.getElementById('ui-step2').classList.add('hidden');
        document.getElementById('ui-sync').classList.remove('hidden');
        document.getElementById('summary-res').innerText = selectedItem;
        let progress = 0;
        const steps = ['Accessing Server...', 'Injecting Packets...', 'Bypassing Security...', 'Finalizing Sync...'];
        const interval = setInterval(() => {
            progress += 5;
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('status-text').innerText = steps[Math.floor(progress/26)] || 'READY';
            if(progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('ui-sync').classList.add('hidden');
                    document.getElementById('ui-locker').classList.remove('hidden');
                }, 600);
            }
        }, 120);
    }

    setInterval(() => {
        const t = ['Ash_Pro', 'PokeLord', 'Shadow_X', 'Sara_99'][Math.floor(Math.random()*4)];
        document.getElementById('live-text').innerText = `Trainer ${t} successfully synced!`;
    }, 4000);
</script>

</body>
</html>
