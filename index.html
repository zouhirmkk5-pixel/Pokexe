<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Champions - Secure Sync</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700;900&display=swap');

        :root {
            --primary: #00f2ff;
            --accent: #7000ff;
            --card-bg: rgba(13, 18, 30, 0.95);
            --border: rgba(0, 242, 255, 0.2);
        }

        body {
            background: #050a14;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top, #0a1a33 0%, #050a14 100%);
        }

        .main-card {
            background: var(--card-bg);
            width: 90%;
            max-width: 420px;
            border-radius: 35px;
            padding: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .logo { width: 140px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(0,242,255,0.3)); }

        .badge-status {
            background: rgba(255, 0, 100, 0.2);
            color: #ff0064;
            border: 1px solid #ff0064;
            font-size: 0.65rem;
            padding: 5px 12px;
            border-radius: 50px;
            font-weight: 900;
            position: absolute;
            top: 25px;
            right: 25px;
        }

        h2 { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; letter-spacing: 2px; margin-top: 40px; }
        p { color: #888; font-size: 0.85rem; margin-bottom: 30px; }

        .grid-rewards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .reward-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .reward-card.active {
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        /* High Quality Image Fix */
        .reward-card img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            image-rendering: -webkit-optimize-contrast; /* Fixes blur */
        }

        .reward-card span { display: block; font-weight: 900; font-size: 1.1rem; margin-bottom: 2px; }
        .reward-card small { color: var(--primary); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }

        .btn-generate {
            background: linear-gradient(90deg, #00f2ff, #7000ff);
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
            transition: 0.3s;
        }

        .btn-generate:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(112, 0, 255, 0.5); }

        .live-feed {
            margin-top: 25px;
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--primary);
            border: 1px solid rgba(0, 242, 255, 0.1);
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="badge-status">V9.4.1 PROTECTED</div>
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" class="logo">
    
    <h2>SELECT RESOURCES</h2>
    <p>Select the distribution pack for your region.</p>

    <div class="grid-rewards">
        <div class="reward-card active">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Pok%C3%A9_Ball_icon.svg" alt="Victory Points">
            <span>50,000</span>
            <small>Victory Points</small>
        </div>

        <div class="reward-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/23/Diamond_icon_flat.svg" alt="Champion Gems">
            <span>10,000</span>
            <small>Champion Gems</small>
        </div>

        <div class="reward-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/47/Ticket_font_awesome_blue.svg" style="filter: hue-rotate(280deg) brightness(1.2);" alt="Elite Pass">
            <span>S12</span>
            <small>Elite Battle Pass</small>
        </div>

        <div class="reward-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/f9/Five_pointed_star.svg" style="filter: drop-shadow(0 0 8px #ffcc00);" alt="Evolution Stone">
            <span>OMNI</span>
            <small>Evolution Stone</small>
        </div>
    </div>

    <button class="btn-generate">GENERATE PACK</button>

    <div class="live-feed">
        <i class="fas fa-bolt"></i> Trainer Sarah_Elite successfully synced Omni Stone!
    </div>
</div>

</body>
</html>
