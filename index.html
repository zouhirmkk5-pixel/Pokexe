<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Champions 2026 - Global Resource Sync</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;800&display=swap');

        :root {
            --primary: #00f2ff;
            --accent: #ff007a;
            --gold: #ffcc00;
            --glass-bg: rgba(10, 15, 30, 0.98);
        }

        body {
            background: #02050a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            background: linear-gradient(rgba(2, 5, 10, 0.9), rgba(2, 5, 10, 0.9)), 
                        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .main-card {
            background: var(--glass-bg);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 30px;
            width: 95%; max-width: 450px;
            padding: 30px;
            margin-top: 50px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }

        .grid-rewards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px; margin: 25px 0;
        }

        .reward-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .reward-card.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); }

        /* Styles dyal l-icons l-jdad f blast t-tsawer */
        .icon-box {
            font-size: 40px;
            margin-bottom: 15px;
            display: block;
        }
        .vp-icon { color: #ff4757; filter: drop-shadow(0 0 10px #ff4757); }
        .gem-icon { color: #00f2ff; filter: drop-shadow(0 0 10px #00f2ff); }
        .pass-icon { color: #ffa502; filter: drop-shadow(0 0 10px #ffa502); }
        .stone-icon { color: #7f8c8d; filter: drop-shadow(0 0 10px #7f8c8d); }

        .reward-card span { display: block; font-weight: 900; font-size: 1.2rem; font-family: 'Orbitron'; }
        .reward-card small { color: #aaa; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }

        .btn-action {
            background: linear-gradient(45deg, var(--primary), #0072ff);
            color: #000; width: 100%; padding: 20px;
            border: none; border-radius: 15px;
            font-weight: 900; font-size: 1.1rem;
            cursor: pointer; font-family: 'Orbitron';
            text-transform: uppercase;
        }

        .trending-section { margin-top: 40px; width: 100%; }
        .char-grid { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .char-card {
            min-width: 120px; background: rgba(255,255,255,0.05);
            padding: 15px; border-radius: 15px; text-align: center;
        }
        .char-card i { font-size: 30px; color: var(--primary); margin-bottom: 10px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="main-card">
    <div style="margin-bottom: 30px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" style="width: 150px;">
    </div>

    <div id="ui-step1">
        <h3 style="font-size: 0.9rem; color: var(--primary); font-family: 'Orbitron';">SELECT RESOURCES</h3>
        
        <div class="grid-rewards">
            <div class="reward-card active" onclick="selectReward(this, '50,000 VP')">
                <i class="fas fa-circle-dot icon-box vp-icon"></i>
                <span>50,000</span>
                <small>Victory Points</small>
            </div>
            <div class="reward-card" onclick="selectReward(this, '10,000 Gems')">
                <i class="fas fa-gem icon-box gem-icon"></i>
                <span>10,000</span>
                <small>Champion Gems</small>
            </div>
            <div class="reward-card" onclick="selectReward(this, 'Elite Pass')">
                <i class="fas fa-ticket icon-box pass-icon"></i>
                <span>S12</span>
                <small>Elite Pass</small>
            </div>
            <div class="reward-card" onclick="selectReward(this, 'Omni Stone')">
                <i class="fas fa-meteor icon-box stone-icon"></i>
                <span>OMNI</span>
                <small>Evolution Stone</small>
            </div>
        </div>

        <button class="btn-action" onclick="toStep2()">Initiate Generator</button>
    </div>

    <div id="ui-locker" class="hidden">
        <h3 style="color: var(--accent); font-family: 'Orbitron';">Verification</h3>
        <i class="fas fa-shield-halved" style="font-size: 50px; color: var(--primary); margin: 20px 0;"></i>
        <p>Sync for <span id="res-name" style="color: var(--primary);">...</span> is ready.</p>
        <button class="btn-action" style="background: var(--accent); color: #fff;" onclick="window.location.href='YOUR_LINK_HERE'">Verify Now</button>
    </div>

    <div style="margin-top: 20px; font-size: 0.75rem; color: #555; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px;">
        <i class="fas fa-bolt" style="color: var(--primary);"></i> Trainer `Daniel_Pro` syncing assets...
    </div>

    <div class="trending-section">
        <p style="font-size: 0.7rem; font-weight: 800; color: #444; text-transform: uppercase; margin-bottom: 15px;">Trending Season 12</p>
        <div class="char-grid">
            <div class="char-card">
                <i class="fas fa-dragon"></i>
                <p style="font-size: 0.6rem; margin:0;">CHARIZARD</p>
            </div>
            <div class="char-card">
                <i class="fas fa-bolt"></i>
                <p style="font-size: 0.6rem; margin:0;">PIKACHU</p>
            </div>
            <div class="char-card">
                <i class="fas fa-hand-fist"></i>
                <p style="font-size: 0.6rem; margin:0;">LUCARIO</p>
            </div>
        </div>
    </div>
</div>

<script>
    let selected = "50,000 VP";
    function selectReward(el, name) {
        document.querySelectorAll('.reward-card').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        selected = name;
    }
    function toStep2() {
        document.getElementById('ui-step1').classList.add('hidden');
        document.getElementById('ui-locker').classList.remove('hidden');
        document.getElementById('res-name').innerText = selected;
    }
</script>

</body>
</html>
