<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Champions 2026 - Global Sync</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;800&display=swap');
        :root { --primary: #00f2ff; --accent: #ff007a; --glass: rgba(10, 15, 30, 0.95); }
        body {
            background: #02050a; color: #fff; font-family: 'Inter', sans-serif; margin: 0;
            background: linear-gradient(rgba(2, 5, 10, 0.9), rgba(2, 5, 10, 0.9)), 
            url('https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Tokyo_Skyline_at_Night_Blue_Hour.jpg/1280px-Tokyo_Skyline_at_Night_Blue_Hour.jpg');
            background-size: cover; background-attachment: fixed;
        }
        nav { background: rgba(0,0,0,0.8); padding: 15px 5%; display: flex; justify-content: space-between; border-bottom: 1px solid var(--primary); }
        .logo-nav { width: 110px; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .main-card {
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            width: 100%; max-width: 450px; padding: 35px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); text-align: center; box-sizing: border-box;
        }
        .grid-rewards { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .reward-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.3s;
        }
        .reward-card.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); }
        .reward-card img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; }
        .btn-action {
            background: linear-gradient(to right, var(--primary), #00a2ff); color: #000;
            width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 900;
            font-family: 'Orbitron'; cursor: pointer; text-transform: uppercase; margin-top: 10px;
        }
        .hidden { display: none; }
        .loader { width: 40px; height: 40px; border: 4px solid #111; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/98/International_Pok%C3%A9mon_logo.svg/250px-International_Pok%C3%A9mon_logo.svg.png" class="logo-nav">
</nav>

<div class="container">
    <div class="main-card">
        <div id="ui-step1">
            <h2 style="color: var(--primary); font-family: 'Orbitron'; font-size: 1.2rem;">TRAINER SYNC</h2>
            <input type="text" id="t-name" style="width:100%; padding:15px; background:#000; border:1px solid var(--primary); color:#fff; border-radius:10px; margin-bottom:15px; box-sizing:border-box;" placeholder="Trainer Name...">
            <button class="btn-action" onclick="document.getElementById('ui-step1').classList.add('hidden'); document.getElementById('ui-step2').classList.remove('hidden');">Connect</button>
        </div>

        <div id="ui-step2" class="hidden">
            <h3 style="font-size: 0.9rem; margin-bottom: 15px;">SELECT ASSETS</h3>
            <div class="grid-rewards">
                <div class="reward-card active" onclick="select(this, '50,000 VP')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Pok%C3%A9_Ball_icon.svg/150px-Pok%C3%A9_Ball_icon.svg.png">
                    <div style="font-weight:900;">50,000</div>
                    <small style="color:var(--primary)">VP Points</small>
                </div>
                <div class="reward-card" onclick="select(this, '10,000 Gems')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Emerald_cut_ruby.svg/150px-Emerald_cut_ruby.svg.png">
                    <div style="font-weight:900;">10,000</div>
                    <small style="color:var(--primary)">Gems</small>
                </div>
                <div class="reward-card" onclick="select(this, 'Elite Pass')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Ticket_font_awesome.svg/150px-Ticket_font_awesome.svg.png" style="filter: invert(1) sepia(1) saturate(5) hue-rotate(170deg);">
                    <div style="font-weight:900;">S12</div>
                    <small style="color:var(--primary)">Elite Pass</small>
                </div>
                <div class="reward-card" onclick="select(this, 'Omni Stone')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Gold_Star.svg/150px-Gold_Star.svg.png">
                    <div style="font-weight:900;">OMNI</div>
                    <small style="color:var(--primary)">Stone</small>
                </div>
            </div>
            <button class="btn-action" onclick="start()">Generate</button>
        </div>

        <div id="ui-sync" class="hidden" style="padding: 30px 0;">
            <div class="loader"></div>
            <div id="status" style="color: var(--primary); font-family: 'Orbitron'; font-size: 0.8rem;">INITIALIZING...</div>
        </div>

        <div id="ui-locker" class="hidden">
            <h3 style="color: var(--accent);">VERIFICATION</h3>
            <div style="border: 1px dashed var(--primary); padding: 20px; border-radius: 15px; margin: 20px 0;">
                <p style="font-size: 0.8rem;">Finalize the sync for your rewards.</p>
                <button class="btn-action" onclick="window.location.href='YOUR_LINK_HERE'">VERIFY NOW</button>
            </div>
        </div>
    </div>
</div>

<script>
    function select(el) {
        document.querySelectorAll('.reward-card').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
    }
    function start() {
        document.getElementById('ui-step2').classList.add('hidden');
        document.getElementById('ui-sync').classList.remove('hidden');
        let p = 0;
        let itv = setInterval(() => {
            p += 10;
            if(p >= 100) {
                clearInterval(itv);
                document.getElementById('ui-sync').classList.add('hidden');
                document.getElementById('ui-locker').classList.remove('hidden');
            }
        }, 200);
    }
</script>
</body>
</html>
